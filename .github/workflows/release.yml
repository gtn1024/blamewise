name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: blamewise-linux-x64
            ext: ""
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: blamewise-linux-arm64
            ext: ""
          - target: bun-darwin-x64
            os: macos-latest
            artifact: blamewise-darwin-x64
            ext: ""
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: blamewise-darwin-arm64
            ext: ""
          - target: bun-windows-x64
            os: ubuntu-latest
            artifact: blamewise-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run lint && bun test

      - run: bun build --compile --target ${{ matrix.target }} src/cli.ts --outfile dist/${{ matrix.artifact }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  build-npm-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun build src/cli.ts --outfile dist/blamewise.js --target node

      - run: sed -i '1s|.*|#!/usr/bin/env node|' dist/blamewise.js

      - uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            dist/blamewise.js
            package.json

  release:
    needs: [build-binaries, build-npm-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/blamewise-*

      - name: Publish to npm
        run: |
          cp artifacts/blamewise.js dist/blamewise.js
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
