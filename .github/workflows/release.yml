name: Release

on:
  push:
    tags: ['v*']

env:
  VERSION: ${{ github.ref_name }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx eslint .
      - run: bun test

  build-binaries:
    needs: test
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            platform: linux-x64
            ext: ''
          - target: bun-linux-arm64
            os: ubuntu-latest
            platform: linux-arm64
            ext: ''
          - target: bun-darwin-x64
            os: macos-latest
            platform: darwin-x64
            ext: ''
          - target: bun-darwin-arm64
            os: macos-latest
            platform: darwin-arm64
            ext: ''
          - target: bun-windows-x64
            os: ubuntu-latest
            platform: windows-x64
            ext: .exe
          - target: bun-windows-arm64
            os: ubuntu-latest
            platform: windows-arm64
            ext: .exe
          - target: bun-linux-x64-musl
            os: ubuntu-latest
            platform: linux-x64-musl
            ext: ''
          - target: bun-linux-arm64-musl
            os: ubuntu-latest
            platform: linux-arm64-musl
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target ${{ matrix.target }} src/cli.ts --outfile dist/blamewise-${{ env.VERSION }}-${{ matrix.platform }}${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: blamewise-${{ env.VERSION }}-${{ matrix.platform }}
          path: dist/blamewise-${{ env.VERSION }}-${{ matrix.platform }}${{ matrix.ext }}

  build-npm-package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build src/cli.ts --outfile dist/blamewise.js --target node
      - name: Add shebang
        run: sed -i '1s|.*|#!/usr/bin/env node|' dist/blamewise.js
      - uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: dist/blamewise.js

  release:
    needs: [build-binaries, build-npm-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/blamewise-*

      - name: Publish to npm
        run: |
          mkdir -p dist
          cp artifacts/blamewise.js dist/blamewise.js
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
